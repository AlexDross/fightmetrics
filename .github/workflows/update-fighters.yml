name: Update Fighters JSON

# Runs automatically every Monday at 2pm UTC (covers Saturday + Sunday events)
# Also runs every Thursday at 2pm UTC (covers mid-week Fight Night events)
# Can also be triggered manually from the GitHub Actions tab
on:
  schedule:
    - cron: '0 14 * * 1'   # Monday  14:00 UTC
    - cron: '0 14 * * 4'   # Thursday 14:00 UTC
  workflow_dispatch:        # Manual trigger button in GitHub Actions tab

jobs:
  update-fighters:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to push back to the repo

    steps:
      # 1. Check out YOUR repo (AlexDross/drosspom-data)
      - name: Checkout drosspom-data
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install Python dependencies
        run: pip install pandas

      # 4. Download the latest Greco1899 CSVs
      - name: Download Greco1899 UFC stats CSVs
        run: |
          wget -q https://github.com/Greco1899/scrape_ufc_stats/archive/refs/heads/main.zip
          unzip -q main.zip
          cp scrape_ufc_stats-main/ufc_fight_results.csv .
          cp scrape_ufc_stats-main/ufc_event_details.csv .
          echo "CSV dates:"
          head -2 ufc_fight_results.csv
          head -2 ufc_event_details.csv

      # 5. Run the update script
      - name: Run update_fighters.py
        run: python update_fighters.py

      # 6. Commit and push only if fightersData.js actually changed
      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/fightersData.js
          if git diff --staged --quiet; then
            echo "No changes to fightersData.js — skipping commit"
          else
            git commit -m "Auto-update fightersData.js $(date -u +'%Y-%m-%d')"
            git push
            echo "✅  Pushed updated fightersData.js"
          fi

      - name: Trigger Vercel redeploy
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
