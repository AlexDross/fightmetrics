name: Update Fighters JSON

on:
  schedule:
    - cron: '0 14 * * 1'   # Monday  14:00 UTC
    - cron: '0 14 * * 4'   # Thursday 14:00 UTC
  workflow_dispatch:

jobs:
  update-fighters:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fightmetrics
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pandas

      - name: Download Greco1899 UFC stats CSVs
        run: |
          wget -q https://github.com/Greco1899/scrape_ufc_stats/archive/refs/heads/main.zip
          unzip -q main.zip
          cp scrape_ufc_stats-main/ufc_fight_results.csv .
          cp scrape_ufc_stats-main/ufc_event_details.csv .
          cp scrape_ufc_stats-main/ufc_fight_details.csv .
          cp scrape_ufc_stats-main/ufc_fight_stats.csv .
          echo "✅  CSVs downloaded"
          echo "fight_stats rows: $(wc -l < ufc_fight_stats.csv)"

      - name: Run update_fighters.py
        run: python update_fighters.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/fightersData.js src/fightHistory.js src/eloModule.js src/cardioModule.js
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "Auto-update fighter data $(date -u +'%Y-%m-%d')"
            git push
            echo "✅  Pushed updated fighter data"
          fi

      - name: Trigger Vercel redeploy
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
