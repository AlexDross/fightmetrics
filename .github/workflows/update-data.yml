name: Update Fighter Data

on:
  schedule:
    - cron: '0 12 * * 2'  # Every Tuesday at noon UTC
  workflow_dispatch:        # Allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Download UFC stats
        run: |
          wget -q https://github.com/Greco1899/scrape_ufc_stats/archive/refs/heads/main.zip
          unzip -q main.zip
          cp scrape_ufc_stats-main/*.csv .

      - name: Build fighters data
        run: python build_fighters_json.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add src/fightersData.js fighters.json
          git commit -m "Auto-update fighter data $(date +%Y-%m-%d)" || echo "No changes"
          git push
